<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Definições - Kiosk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container-fluid">
        <div class="row">

            <!-- MENU LATERAL -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-black vh-100 position-fixed">
                <div class="pt-4 px-3 text-white">
                    <h4 class="mb-4">Menu</h4>

                    <ul class="nav flex-column">
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="screen_alert.html">📨 Mensagens</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="historico.html">📋 Histórico</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white active" href="definicoes.html">⚙️ Definições</a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- CONTEÚDO -->
            <main class="col-md-9 ms-sm-auto col-lg-10 offset-md-3 offset-lg-2 vh-100 overflow-auto">
                <div class="container py-4">

                    <h2 class="mb-4">⚙️ Definições do Sistema</h2>

                    <!-- SISTEMA -->
                    <div class="card bg-secondary mb-4">
                        <div class="card-body">
                            <h5 class="card-title">Sistema</h5>

                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="autoUpdate" checked>
                                <label class="form-check-label" for="autoUpdate">
                                    Atualização automática das mensagens
                                </label>
                            </div>

                            <div class="mt-3">
                                <label class="form-label">Intervalo de atualização</label>
                                <select class="form-select">
                                    <option>5 segundos</option>
                                    <option>10 segundos</option>
                                    <option>30 segundos</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- NOTIFICAÇÕES -->
                    <div class="card bg-secondary mb-4">
                        <div class="card-body">
                            <h5 class="card-title">🔔 Notificações</h5>

                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="soundAlert" checked>
                                <label class="form-check-label" for="soundAlert">
                                    Ativar som ao receber mensagem
                                </label>
                            </div>

                            <div class="mt-3">
                                <label class="form-label">Volume</label>
                                <input type="range" class="form-range" min="0" max="100">
                            </div>
                        </div>
                    </div>

                    <!-- ACESSIBILIDADE -->
                    <div class="card bg-secondary mb-4">
                        <div class="card-body">
                            <h5 class="card-title">👁 Acessibilidade</h5>

                            <div class="mt-3">
                                <label class="form-label">Tamanho do Texto</label>
                                <select class="form-select">
                                    <option>Pequeno</option>
                                    <option selected>Médio</option>
                                    <option>Grande</option>
                                    <option>Extra Grande</option>
                                </select>
                            </div>

                            <div class="form-check form-switch mt-3">
                                <input class="form-check-input" type="checkbox" id="darkMode" checked>
                                <label class="form-check-label" for="darkMode">
                                    Modo Escuro
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- BOTÃO GUARDAR -->
                    <div class="text-end">
                        <button class="btn btn-success btn-lg">
                            💾 Guardar Definições
                        </button>
                    </div>

                </div>
            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
