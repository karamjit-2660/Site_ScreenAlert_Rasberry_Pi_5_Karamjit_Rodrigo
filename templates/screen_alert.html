<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kiosk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

    <div class="container-fluid">
        <div class="row">

            <nav class="col-md-3 col-lg-2 d-md-block bg-black vh-100 position-fixed">
                <div class="pt-4 px-3 text-white">

                    <h4 class="mb-4">Menu</h4>


                    <ul class="nav flex-column">

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white active" href="screen_alert.html">
                                📨 Mensagens
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="historico.html">
                                📋 Histórico
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="consultar_horario.html">
                                📅 Consultar horário
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="definicoes.html">
                                ⚙️ Definições
                            </a>
                        </li>

                    </ul>

                </div>
            </nav>

            <main class="col-md-6 ms-sm-auto col-lg-10 offset-md-3 offset-lg-2 vh-100 d-flex">

                <div class="container py-4">

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <div class="card shadow-lg text-center bg-black text-white">
                                <div class="card-body py-5">

                                    <div id="bigClock" class="display-1 fw-bold">
                                        00:00:00
                                    </div>

                                    <div id="bigDate" class="fs-3 mt-3">
                                        1 de Janeiro de 2026
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row mb-4">

                    <div class="col-md-6 d-flex flex-column gap-4">


                            <div class="card shadow-lg flex-fill">
                                <div
                                    class="card-body d-flex flex-column justify-content-center align-items-center text-center">

                                    <h4 class="card-title mb-4">
                                        Temperatura Atual 🌡️
                                    </h4>

                                    <div class="display-4 fw-bold">
                                        22°C
                                    </div>

                                </div>
                            </div>

                        </div>
                        </div>

                    <div class="row g-4">

                        <div class="col-md-12 d-flex flex-column gap-4">
                            <div class="card shadow-lg h-100" style="min-height: 70vh;">
                                <div class="card-body d-flex flex-column">

                                    <h4 class="card-title text-center mb-4">
                                        Mensagem enviada
                                    </h4>

                                    <div class="border rounded p-4 bg-light flex-grow-1">
                                        <p class="mb-0" id="msgText">
                                            Mãe toma os remédios, por favor!
                                        </p>
                                    </div>

                                    <div class="d-flex justify-content-between mt-3">
                                        <button class="btn btn-success w-50 me-2">
                                            Lida
                                        </button>
                                        <button class="btn btn-danger w-50 ms-2">
                                            Apagar
                                        </button>
                                    </div>

                                </div>
                            </div>
                        </div>

                    </div>

                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function updateDateTime() {
            const now = new Date();

            // Hora
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById("bigClock").textContent = timeString;

            // Data
            const options = {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            };

            const dateString = now.toLocaleDateString('pt-PT', options);
            document.getElementById("bigDate").textContent = dateString;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>

</html>
