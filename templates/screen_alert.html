<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kiosk</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

    <div class="container-fluid">
        <div class="row">

            <nav class="col-md-3 col-lg-2 d-md-block bg-black vh-100 position-fixed">
                <div class="pt-4 px-3 text-white">

                    <h4 class="mb-4">Menu</h4>


                    <ul class="nav flex-column">

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white active" href="screen_alert.html">
                                📨 Mensagens
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="historico.html">
                                📋 Histórico
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="consultar_horario.html">
                                📅 Consultar horário
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="definicoes.html">
                                ⚙️ Definições
                            </a>
                        </li>

                    </ul>

                </div>
            </nav>

            <main class="col-12 col-md-9 offset-md-3 vh-100 d-flex">

                <div class="container-fluid py-3">

                    <div class="row g-3">

                        <!-- Relógio -->
                        <div class="col-6">
                            <div class="card bg-black text-white shadow-lg h-100">
                                <div class="card-body d-flex flex-column justify-content-center text-center">

                                    <div id="bigClock" class="fw-bold" style="font-size: 4rem;">
                                        00:00
                                    </div>

                                    <div id="bigDate" class="mt-2" style="font-size: 1.4rem;">
                                        10 de março de 2026
                                    </div>

                                </div>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="card bg-black text-white shadow-lg h-100">
                                <div class="card-body d-flex flex-column justify-content-center text-center">

                                    <h5 class="mb-2">Temperatura Atual 🌡️</h5>

                                    <div class="fw-bold" style="font-size: 4rem;">
                                        22°C
                                    </div>

                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="row mt-3">
                        <div class="col-12">
                            <div class="card shadow-lg" style="height: 58vh;">
                                <div class="card-body d-flex flex-column">

                                    <h4 class="text-center mb-3">Mensagem enviada</h4>

                                    <div class="border rounded p-4 bg-light flex-grow-1">
                                        <p id="msgText" class="fs-3">
                                            Mãe toma os remédios, por favor!
                                        </p>
                                    </div>

                                    <div class="d-flex justify-content-between mt-3">
                                        <button class="btn btn-success w-50 me-2">Lida</button>
                                        <button class="btn btn-danger w-50 ms-2">Apagar</button>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>

                </div>

            </main>


        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function updateDateTime() {
            const now = new Date();

            // Hora
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            const timeString = `${hours}:${minutes}`;
            document.getElementById("bigClock").textContent = timeString;

            // Data
            const options = {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            };

            const dateString = now.toLocaleDateString('pt-PT', options);
            document.getElementById("bigDate").textContent = dateString;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>

</html>
