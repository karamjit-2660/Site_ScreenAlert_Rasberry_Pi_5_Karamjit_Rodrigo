<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Horário - Kiosk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <div class="container-fluid">
        <div class="row">

            <nav class="col-md-3 col-lg-2 d-md-block bg-black vh-100 position-fixed">
                <div class="pt-4 px-3 text-white">
                    <h4 class="mb-4">Menu</h4>
                    <ul class="nav flex-column">
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="screen_alert.html">📨 Mensagens</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="historico.html">📋 Histórico</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white active" href="consultar_horario.html">📅 Consultar horário</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="definicoes.html">⚙️ Definições</a>
                        </li>
                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="#" onclick="logout()">🚪 Logout</a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 offset-md-3 offset-lg-2 vh-100 overflow-auto">
                <div class="container py-4">

                    <h2 class="mb-4">📅 Horário de Medicamentos</h2>

                    <div class="d-flex gap-2 mb-4 flex-wrap" id="diasSemana"></div>

                    <div id="listaMedicamentos"></div>

                </div>
            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        const nomesDias = ["", "Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
        const nomesDiasCompletos = ["", "Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        let diaAtivo = new Date().getDay() + 1; // 1=Domingo, 2=Segunda...
        let todosHorarios = [];

        function renderDias() {
            const container = document.getElementById("diasSemana");
            container.innerHTML = "";

            for (let i = 1; i <= 7; i++) {
                const btn = document.createElement("button");
                btn.className = "btn " + (i === diaAtivo ? "btn-primary" : "btn-outline-secondary");
                btn.textContent = nomesDias[i];
                btn.onclick = () => {
                    diaAtivo = i;
                    renderDias();
                    renderMedicamentos();
                };
                container.appendChild(btn);
            }
        }

        function renderMedicamentos() {
            const container = document.getElementById("listaMedicamentos");

            // agrupar por medicamento
            const agrupados = {};
            todosHorarios.forEach(row => {
                if (!agrupados[row.id]) {
                    agrupados[row.id] = {
                        nome: row.name_medication,
                        descricao: row.description_medication,
                        dias: []
                    };
                }
                agrupados[row.id].dias.push({ dia: row.day_of_doce, doce: row.doce });
            });

            const medicamentosDoDia = Object.values(agrupados).filter(med =>
                med.dias.some(d => d.dia === diaAtivo)
            );

            if (medicamentosDoDia.length === 0) {
                container.innerHTML = `
                    <div class="card bg-secondary">
                        <div class="card-body text-center py-5">
                            <p class="fs-5 mb-0">Nenhum medicamento para ${nomesDiasCompletos[diaAtivo]}.</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = medicamentosDoDia.map(med => {
                const diaInfo = med.dias.find(d => d.dia === diaAtivo);
                return `
                    <div class="card bg-secondary mb-3">
                        <div class="card-body d-flex align-items-center gap-4">

                            <div class="text-center" style="min-width: 100px;">
                                <div class="fw-bold fs-4 text-warning">Cada ${diaInfo.doce}h</div>
                            </div>

                            <div class="vr"></div>

                            <div class="flex-grow-1">
                                <div class="fw-bold fs-5">Nome: ${med.nome}</div>
                                ${med.descricao ? `<div class="text-white-50 mt-1"><small>Descrição: ${med.descricao}</small></div>` : ""}
                            </div>

                            <div class="d-flex gap-1 flex-wrap justify-content-end" style="max-width: 200px;">
                                ${[1,2,3,4,5,6,7].map(i => `
                                    <span class="badge ${med.dias.some(d => d.dia === i) ? "bg-primary" : "bg-dark border border-secondary text-secondary"}">${nomesDias[i]}</span>
                                `).join("")}
                            </div>

                        </div>
                    </div>
                `;
            }).join("");
        }

        async function carregarHorario() {
            try {
                const res = await fetch("http://192.168.1.100:5000/horario", {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = "login.html";
                    return;
                }

                const data = await res.json();
                todosHorarios = data;
                renderDias();
                renderMedicamentos();

            } catch (err) {
                document.getElementById("listaMedicamentos").innerHTML = `
                    <div class="card bg-secondary">
                        <div class="card-body text-center py-5">
                            <p class="fs-5 mb-0">Erro ao ligar ao servidor.</p>
                        </div>
                    </div>
                `;
            }
        }

        carregarHorario();
    </script>

</body>

</html>
