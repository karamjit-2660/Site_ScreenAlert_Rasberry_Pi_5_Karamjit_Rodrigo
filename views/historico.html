<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Histórico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark">

    <div class="container-fluid">
        <div class="row">

            <nav class="col-md-3 col-lg-2 d-md-block bg-black vh-100 position-fixed">
                <div class="pt-4 px-3 text-white">

                    <h4 class="mb-4">Menu</h4>

                    <ul class="nav flex-column">

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="screen_alert.html">
                                📨 Mensagens
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white active" href="historico.html">
                                📋 Histórico
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="consultar_horario.html">
                                📅 Consultar horário
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="definicoes.html">
                                ⚙️ Definições
                            </a>
                        </li>

                        <li class="nav-item mb-2">
                            <a class="nav-link text-white" href="#" onclick="logout()">
                                🚪 Logout
                            </a>
                        </li>

                    </ul>

                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 offset-md-3 offset-lg-2 vh-100">

                <div class="container py-4">

                    <h2 class="text-white mb-4">Histórico de Mensagens</h2>

                    <div class="card shadow-lg">
                        <div class="card-body">

                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Data</th>
                                        <th>Mensagem</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaHistorico">
                                    <tr><td colspan="2" class="text-center">A carregar...</td></tr>
                                </tbody>
                            </table>

                        </div>
                    </div>

                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        async function carregarHistorico() {
            try {
                const res = await fetch("http://192.168.1.21:5000/historicoMensagens", {
                    headers: { "Authorization": "Bearer " + token }
                });

                if (res.status === 401) {
                    localStorage.clear();
                    window.location.href = "login.html";
                    return;
                }

                const data = await res.json();
                const tbody = document.getElementById("tabelaHistorico");

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" class="text-center">Sem mensagens.</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.map(msg => {
                    const data_msg = new Date(msg.sent_at).toLocaleString('pt-PT');
                    return `<tr>
                        <td>${data_msg}</td>
                        <td>${msg.text_message}</td>
                    </tr>`;
                }).join("");

            } catch (err) {
                document.getElementById("tabelaHistorico").innerHTML = `<tr><td colspan="2" class="text-center">Erro ao ligar ao servidor.</td></tr>`;
            }
        }

        carregarHistorico();
    </script>

</body>

</html>
