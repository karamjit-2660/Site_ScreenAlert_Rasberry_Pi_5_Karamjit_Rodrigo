<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ScreenAlert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 350px;">
        <h3 class="text-center mb-3">Login</h3>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="text" id="email" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" id="password" class="form-control">
        </div>
        <button class="btn btn-primary w-100" onclick="fazerLogin()">Entrar</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <script>
        if (localStorage.getItem("token")) {
            window.location.href = "screen_alert.html";
        }

        async function fazerLogin() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const formData = new FormData();
            formData.append("email", email);
            formData.append("password", password);

            try {
                const res = await fetch("http://192.168.1.100:5000/login", {
                    method: "POST",
                    body: formData
                });

                const data = await res.json();

                if (!res.ok) {
                    toastr.error(data.error);
                    return;
                }

                localStorage.setItem("token", data.token);
                localStorage.setItem("id", data.id);
                localStorage.setItem("name", data.name);

                toastr.success("Bem-vindo, " + data.name + "!");

                setTimeout(() => {
                    window.location.href = "screen_alert.html";
                }, 1000);

            } catch (err) {
                toastr.error("Erro ao ligar ao servidor.");
            }
        }
    </script>

</body>

</html>
